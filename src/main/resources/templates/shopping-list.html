<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${list.name} + ' – Dinner Service'">Shopping List</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        header {
            background: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        header h1 { color: #e67e22; margin: 0; font-size: 1.4rem; }
        nav a { color: #e67e22; text-decoration: none; margin-right: 1.5rem; font-size: 0.95rem; }
        nav a:hover { text-decoration: underline; }
        form.logout button {
            background: none;
            border: 2px solid #e67e22;
            color: #e67e22;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        form.logout button:hover { background: #e67e22; color: white; }
        .page { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }
        .summary {
            display: flex;
            gap: 2rem;
            margin-bottom: 0;
        }
        .summary-box {
            flex: 1;
            text-align: center;
            padding: 1rem;
            background: #fdf3e7;
            border-radius: 8px;
        }
        .summary-box .value { font-size: 2rem; font-weight: bold; color: #e67e22; }
        .summary-box .label { font-size: 0.85rem; color: #777; margin-top: 0.2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        th {
            text-align: left;
            padding: 0.6rem 0.8rem;
            border-bottom: 2px solid #eee;
            color: #777;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        td { padding: 0.7rem 0.8rem; border-bottom: 1px solid #f0f0f0; color: #2c3e50; }
        tr:last-child td { border-bottom: none; }
        .added-by { font-size: 0.8rem; color: #aaa; }
        .delete-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0;
        }
        .delete-btn:hover { text-decoration: underline; }
        .add-form {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 0.5rem;
            align-items: end;
        }
        .add-form label { font-size: 0.8rem; color: #777; display: block; margin-bottom: 0.2rem; }
        .add-form input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            font-size: 0.95rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .add-form input:focus { border-color: #e67e22; }
        .add-form button {
            padding: 0.6rem 1.2rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .add-form button:hover { background: #cf6d17; }
        .share-form { display: flex; gap: 0.5rem; }
        .share-form input {
            flex: 1;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .share-form input:focus { border-color: #e67e22; }
        .share-form button {
            padding: 0.6rem 1.2rem;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .share-form button:hover { background: #1a252f; }
        .shared-users { margin-top: 0.8rem; font-size: 0.9rem; color: #555; }
        .shared-users span {
            display: inline-block;
            background: #f0f0f0;
            border-radius: 20px;
            padding: 0.2rem 0.7rem;
            margin: 0.2rem;
        }
        h2 { color: #2c3e50; margin-top: 0; }
        .back { color: #e67e22; text-decoration: none; font-size: 0.9rem; }
        .back:hover { text-decoration: underline; }
        .empty { color: #aaa; font-style: italic; padding: 1rem 0; }
    </style>
</head>
<body>
    <header>
        <h1>Dinner Service</h1>
        <nav>
            <a href="/dashboard">Dashboard</a>
            <a href="/shopping-lists">Shopping Lists</a>
        </nav>
        <div style="display:flex;align-items:center;gap:1rem;">
            <span th:text="${email}" style="color:#555;font-size:0.95rem;"></span>
            <form method="post" action="/logout" class="logout">
                <button type="submit">Log out</button>
            </form>
        </div>
    </header>

    <div class="page">
        <a href="/shopping-lists" class="back">← Back to lists</a>
        <h2 style="margin:0.8rem 0;" th:text="${list.name}"></h2>

        <!-- Summary -->
        <div class="card">
            <div class="summary">
                <div class="summary-box">
                    <div class="value" th:text="${totalItems}"></div>
                    <div class="label">Items</div>
                </div>
                <div class="summary-box">
                    <div class="value" th:text="${#numbers.formatDecimal(totalPrice, 1, 2)}"></div>
                    <div class="label">Total Price</div>
                </div>
            </div>
        </div>

        <!-- Add item -->
        <div class="card">
            <h2>Add Item</h2>
            <form th:action="'/shopping-lists/' + ${list.id} + '/items'" method="post" class="add-form">
                <div>
                    <label>Item name *</label>
                    <input type="text" name="name" placeholder="e.g. Milk" required />
                </div>
                <div>
                    <label>Count</label>
                    <input type="number" name="count" placeholder="e.g. 2" step="1" min="0" />
                </div>
                <div>
                    <label>Unit price</label>
                    <input type="number" name="unitPrice" placeholder="e.g. 9.90" step="0.01" min="0" />
                </div>
                <button type="submit">Add</button>
            </form>
        </div>

        <!-- Items table -->
        <div class="card">
            <h2>Items</h2>
            <div th:if="${#lists.isEmpty(items)}" class="empty">No items yet. Add one above.</div>
            <table th:if="${not #lists.isEmpty(items)}">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Count</th>
                        <th>Unit Price</th>
                        <th>Total</th>
                        <th>Added by</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.name}"></td>
                        <td th:text="${item.count != null ? item.count.intValue() : '–'}"></td>
                        <td th:text="${item.unitPrice != null ? #numbers.formatDecimal(item.unitPrice, 1, 2) : '–'}"></td>
                        <td th:text="${item.totalPrice != null ? #numbers.formatDecimal(item.totalPrice, 1, 2) : '–'}"></td>
                        <td class="added-by" th:text="${item.addedBy?.email}"></td>
                        <td>
                            <form th:action="'/shopping-lists/' + ${list.id} + '/items/' + ${item.id} + '/delete'" method="post">
                                <button class="delete-btn" type="submit">Remove</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Share (owner only) -->
        <div class="card" th:if="${isOwner}">
            <h2>Share List</h2>
            <form th:action="'/shopping-lists/' + ${list.id} + '/share'" method="post" class="share-form">
                <input type="email" name="email" placeholder="Enter user's email" required />
                <button type="submit">Share</button>
            </form>
            <div class="shared-users" th:if="${not #sets.isEmpty(list.sharedWith)}">
                <span th:each="u : ${list.sharedWith}" th:text="${u.email}"></span>
            </div>
        </div>
    </div>
</body>
</html>
