<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${list.name} + ' – Dinner Service'">Shopping List</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        header {
            background: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        header h1 { color: #e67e22; margin: 0; font-size: 1.3rem; }
        form.logout button {
            background: none;
            border: 2px solid #e67e22;
            color: #e67e22;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        form.logout button:hover { background: #e67e22; color: white; }
        .page { max-width: 800px; margin: 1.5rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 1.2rem 1rem;
            margin-bottom: 1.2rem;
        }
        .summary { display: flex; gap: 1rem; }
        .summary-box {
            flex: 1;
            text-align: center;
            padding: 1rem 0.5rem;
            background: #fdf3e7;
            border-radius: 8px;
        }
        .summary-box .value { font-size: 1.8rem; font-weight: bold; color: #e67e22; }
        .summary-box .label { font-size: 0.8rem; color: #777; margin-top: 0.2rem; }
        /* Add form - stacks on mobile */
        .add-form { display: flex; flex-direction: column; gap: 0.6rem; }
        .add-form label { font-size: 0.8rem; color: #777; display: block; margin-bottom: 0.2rem; }
        .add-form input {
            width: 100%;
            padding: 0.75rem 0.8rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .add-form input:focus { border-color: #e67e22; }
        .add-form .row { display: flex; gap: 0.6rem; }
        .add-form .row > div { flex: 1; }
        .add-form button {
            width: 100%;
            padding: 0.85rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .add-form button:hover { background: #cf6d17; }
        /* Table with horizontal scroll on mobile */
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th {
            text-align: left;
            padding: 0.6rem 0.5rem;
            border-bottom: 2px solid #eee;
            color: #777;
            font-size: 0.8rem;
            text-transform: uppercase;
            white-space: nowrap;
        }
        td { padding: 0.75rem 0.5rem; border-bottom: 1px solid #f0f0f0; color: #2c3e50; font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        tr.checked td { color: #bbb; text-decoration: line-through; }
        .added-by { font-size: 0.75rem; color: #aaa; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tick-btn {
            background: none;
            border: 2px solid #ddd;
            border-radius: 4px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            padding: 0;
        }
        .tick-btn.done { border-color: #27ae60; background: #27ae60; color: white; }
        .delete-btn {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
            line-height: 1;
        }
        .delete-btn:hover { background: #e74c3c; color: white; }
        /* Share form */
        .share-form { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .share-form input {
            flex: 1;
            min-width: 0;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .share-form input:focus { border-color: #e67e22; }
        .share-form button {
            padding: 0.75rem 1.2rem;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .share-form button:hover { background: #1a252f; }
        .shared-users { margin-top: 0.8rem; font-size: 0.9rem; color: #555; }
        .shared-users span {
            display: inline-block;
            background: #f0f0f0;
            border-radius: 20px;
            padding: 0.2rem 0.7rem;
            margin: 0.2rem;
            font-size: 0.85rem;
            word-break: break-all;
        }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.1rem; }
        .back { color: #e67e22; text-decoration: none; font-size: 0.9rem; }
        .back:hover { text-decoration: underline; }
        .list-title { margin: 0.8rem 0; font-size: 1.3rem; color: #2c3e50; }
        .empty { color: #aaa; font-style: italic; padding: 0.5rem 0; }
        @media (min-width: 600px) {
            .add-form { flex-direction: row; align-items: flex-end; }
            .add-form .row { flex: 1; }
            .add-form > div:first-child { flex: 2; }
            .add-form button { width: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Dinner Service</h1>
        <form method="post" action="/logout" class="logout">
            <button type="submit">Log out</button>
        </form>
    </header>

    <div class="page">
        <a href="/shopping-lists" class="back">← Back to lists</a>
        <h2 class="list-title" th:text="${list.name}"></h2>

        <!-- Summary -->
        <div class="card">
            <div class="summary">
                <div class="summary-box">
                    <div class="value" th:text="${totalItems}"></div>
                    <div class="label">Items</div>
                </div>
                <div class="summary-box">
                    <div class="value" th:text="${#numbers.formatDecimal(totalPrice, 1, 2)}"></div>
                    <div class="label">Total Price</div>
                </div>
            </div>
        </div>

        <!-- Add item -->
        <div class="card">
            <h2>Add Item</h2>
            <form th:action="'/shopping-lists/' + ${list.id} + '/items'" method="post" class="add-form">
                <div>
                    <label>Item name *</label>
                    <input type="text" name="name" placeholder="e.g. Milk" required />
                </div>
                <div class="row">
                    <div>
                        <label>Count</label>
                        <input type="number" name="count" placeholder="e.g. 2" step="1" min="0" />
                    </div>
                    <div>
                        <label>Unit price</label>
                        <input type="number" name="unitPrice" placeholder="e.g. 9.90" step="0.01" min="0" />
                    </div>
                </div>
                <button type="submit">Add</button>
            </form>
        </div>

        <!-- Items table -->
        <div class="card">
            <h2>Items</h2>
            <div th:if="${#lists.isEmpty(items)}" class="empty">No items yet. Add one above.</div>
            <div class="table-wrap" th:if="${not #lists.isEmpty(items)}">
                <table>
                    <thead>
                        <tr>
                            <th></th>
                            <th>Item</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Total</th>
                            <th>By</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${items}" th:classappend="${item.checked} ? 'checked' : ''">
                            <td>
                                <form th:action="'/shopping-lists/' + ${list.id} + '/items/' + ${item.id} + '/toggle'" method="post">
                                    <button type="submit" th:classappend="${item.checked} ? 'done' : ''" class="tick-btn">✓</button>
                                </form>
                            </td>
                            <td th:text="${item.name}"></td>
                            <td th:text="${item.count != null ? item.count.intValue() : '–'}"></td>
                            <td th:text="${item.unitPrice != null ? #numbers.formatDecimal(item.unitPrice, 1, 2) : '–'}"></td>
                            <td th:text="${item.totalPrice != null ? #numbers.formatDecimal(item.totalPrice, 1, 2) : '–'}"></td>
                            <td class="added-by" th:text="${item.addedBy?.email}"></td>
                            <td>
                                <form th:action="'/shopping-lists/' + ${list.id} + '/items/' + ${item.id} + '/delete'" method="post">
                                    <button class="delete-btn" type="submit">🗑</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Share (owner only) -->
        <div class="card" th:if="${isOwner}">
            <h2>Share List</h2>
            <form th:action="'/shopping-lists/' + ${list.id} + '/share'" method="post" class="share-form">
                <input type="email" name="email" placeholder="Enter user's email" required />
                <button type="submit">Share</button>
            </form>
            <div class="shared-users" th:if="${not #sets.isEmpty(list.sharedWith)}">
                <span th:each="u : ${list.sharedWith}" th:text="${u.email}"></span>
            </div>
        </div>
    </div>
</body>
</html>
