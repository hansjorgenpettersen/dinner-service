<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${recipe.name} + ' – Dinner Service'">Recipe – Dinner Service</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        header {
            background: white;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        header h1 { color: #e67e22; margin: 0; font-size: 1.3rem; }
        nav { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        nav a {
            color: #555;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        nav a:hover, nav a.active { background: #fdf3e7; color: #e67e22; }
        form.logout button {
            background: none;
            border: 2px solid #e67e22;
            color: #e67e22;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        form.logout button:hover { background: #e67e22; color: white; }
        .page { max-width: 700px; margin: 1.5rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 1.2rem 1rem;
            margin-bottom: 1.2rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        h2 { color: #2c3e50; margin: 0; font-size: 1.1rem; }
        .back-link { color: #e67e22; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }

        /* Edit recipe form */
        .edit-section { display: none; }
        .edit-section.open { display: block; }
        .field { margin-bottom: 0.8rem; }
        .field label { display: block; font-size: 0.85rem; color: #777; margin-bottom: 0.3rem; }
        .field input, .field textarea {
            width: 100%;
            padding: 0.7rem 0.8rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
            resize: vertical;
        }
        .field input:focus, .field textarea:focus { border-color: #e67e22; }
        .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn-save {
            padding: 0.65rem 1.2rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-save:hover { background: #1e8449; }
        .btn-edit {
            padding: 0.4rem 0.9rem;
            background: none;
            border: 2px solid #3498db;
            color: #3498db;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-edit:hover { background: #3498db; color: white; }
        .btn-cancel {
            padding: 0.65rem 1rem;
            background: none;
            border: 2px solid #aaa;
            color: #777;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-cancel:hover { background: #eee; }

        /* Description display */
        .description-text {
            color: #444;
            font-size: 0.97rem;
            line-height: 1.6;
            white-space: pre-wrap;
            margin: 0;
        }
        .empty-desc { color: #aaa; font-style: italic; }

        /* Ingredients */
        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 0;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
        }
        .ingredient-item:last-child { border-bottom: none; }
        .color-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .ing-name { font-weight: bold; color: #2c3e50; flex: 1; min-width: 100px; }
        .ing-qty {
            color: #666;
            font-size: 0.95rem;
            background: #f5f5f5;
            border-radius: 6px;
            padding: 0.2rem 0.6rem;
            white-space: nowrap;
        }
        .delete-btn {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.25rem 0.45rem;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .delete-btn:hover { background: #e74c3c; color: white; }

        /* Add ingredient form */
        .add-form {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed #eee;
        }
        .add-form select, .add-form input {
            padding: 0.65rem 0.8rem;
            font-size: 0.95rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: white;
        }
        .add-form select:focus, .add-form input:focus { border-color: #e67e22; }
        .add-form .qty-input { max-width: 90px; flex: 0 0 90px; }
        .add-form .unit-select { max-width: 100px; flex: 0 0 100px; }
        .add-form .product-select { flex: 1; min-width: 140px; }
        .add-form .btn-add {
            padding: 0.65rem 1.1rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .add-form .btn-add:hover { background: #cf6d17; }
        .empty { color: #aaa; font-style: italic; padding: 0.4rem 0; }
    </style>
</head>
<body>
    <header>
        <h1>Dinner Service</h1>
        <nav>
            <a href="/shopping-lists">Shopping Lists</a>
            <a href="/products">Products</a>
            <a href="/recipes" class="active">Recipes</a>
        </nav>
        <form method="post" action="/logout" class="logout">
            <button type="submit">Log out</button>
        </form>
    </header>

    <div class="page">

        <!-- Recipe name & description -->
        <div class="card">
            <div class="card-header">
                <h2 th:text="${recipe.name}"></h2>
                <div style="display:flex;gap:0.4rem;align-items:center;">
                    <a href="/recipes" class="back-link">← All recipes</a>
                    <button class="btn-edit" type="button" onclick="toggleEdit()">Edit</button>
                </div>
            </div>

            <!-- Display mode -->
            <div id="view-section">
                <p class="description-text"
                   th:if="${!#strings.isEmpty(recipe.description)}"
                   th:text="${recipe.description}"></p>
                <p class="empty-desc"
                   th:if="${#strings.isEmpty(recipe.description)}">No description yet.</p>
            </div>

            <!-- Edit mode -->
            <div id="edit-section" class="edit-section">
                <form th:action="'/recipes/' + ${recipe.id} + '/edit'" method="post">
                    <div class="field">
                        <label>Name</label>
                        <input type="text" name="name" th:value="${recipe.name}" required />
                    </div>
                    <div class="field">
                        <label>Description / Instructions</label>
                        <textarea name="description" rows="8"
                                  placeholder="Write instructions, notes, tips…"
                                  th:text="${recipe.description}"></textarea>
                    </div>
                    <div class="btn-row">
                        <button type="submit" class="btn-save">Save</button>
                        <button type="button" class="btn-cancel" onclick="toggleEdit()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Ingredients -->
        <div class="card">
            <h2>Ingredients</h2>
            <div th:if="${#lists.isEmpty(ingredients)}" class="empty">No ingredients yet.</div>
            <div th:each="ing : ${ingredients}" class="ingredient-item">
                <div class="color-dot"
                     th:style="'background:' + (${ing.product?.category?.color} ?: '#eee')"></div>
                <span class="ing-name" th:text="${ing.product?.name}"></span>
                <span class="ing-qty"
                      th:text="${ing.quantity != null ? #numbers.formatDecimal(ing.quantity, 1, 'DEFAULT', 2, 'DEFAULT') + ' ' + ing.unit : ing.unit}"></span>
                <form th:action="'/recipes/' + ${recipe.id} + '/ingredients/' + ${ing.id} + '/delete'" method="post">
                    <button class="delete-btn" type="submit">🗑</button>
                </form>
            </div>

            <!-- Add ingredient -->
            <form th:action="'/recipes/' + ${recipe.id} + '/ingredients'" method="post" class="add-form">
                <select name="productId" class="product-select" required>
                    <option value="" disabled selected>Select product…</option>
                    <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}"></option>
                </select>
                <input type="number" name="quantity" placeholder="Qty" step="0.01" min="0" class="qty-input" />
                <select name="unit" class="unit-select" required>
                    <option value="" disabled selected>Unit</option>
                    <option th:each="u : ${units}" th:value="${u}" th:text="${u}"></option>
                </select>
                <button type="submit" class="btn-add">Add</button>
            </form>
        </div>

    </div>

    <script>
        function toggleEdit() {
            document.getElementById('edit-section').classList.toggle('open');
            document.getElementById('view-section').style.display =
                document.getElementById('edit-section').classList.contains('open') ? 'none' : '';
        }
    </script>
</body>
</html>
