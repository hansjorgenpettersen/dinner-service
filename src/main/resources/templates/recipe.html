<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e67e22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dinner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
    <title th:text="${recipe.name} + ' – Dinner Service'">Recipe – Dinner Service</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        header {
            background: white;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        header h1 { color: #e67e22; margin: 0; font-size: 1.3rem; }
        nav { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        nav a {
            color: #555;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        nav a:hover, nav a.active { background: #fdf3e7; color: #e67e22; }
        form.logout button {
            background: none;
            border: 2px solid #e67e22;
            color: #e67e22;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        form.logout button:hover { background: #e67e22; color: white; }
        .page { max-width: 700px; margin: 1.5rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 1.2rem 1rem;
            margin-bottom: 1.2rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        h2 { color: #2c3e50; margin: 0; font-size: 1.1rem; }
        .back-link { color: #e67e22; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }

        /* Edit recipe form */
        .edit-section { display: none; }
        .edit-section.open { display: block; }
        .field { margin-bottom: 0.8rem; }
        .field label { display: block; font-size: 0.85rem; color: #777; margin-bottom: 0.3rem; }
        .field input, .field textarea {
            width: 100%;
            padding: 0.7rem 0.8rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
            resize: vertical;
        }
        .field input:focus, .field textarea:focus { border-color: #e67e22; }
        .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn-save {
            padding: 0.65rem 1.2rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-save:hover { background: #1e8449; }
        .btn-edit {
            padding: 0.4rem 0.9rem;
            background: none;
            border: 2px solid #3498db;
            color: #3498db;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-edit:hover { background: #3498db; color: white; }
        .btn-cancel {
            padding: 0.65rem 1rem;
            background: none;
            border: 2px solid #aaa;
            color: #777;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-cancel:hover { background: #eee; }

        /* Description display */
        .description-text {
            color: #444;
            font-size: 0.97rem;
            line-height: 1.6;
            white-space: pre-wrap;
            margin: 0;
        }
        .empty-desc { color: #aaa; font-style: italic; }

        /* List selector */
        .list-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .list-selector label { font-size: 0.85rem; color: #777; white-space: nowrap; }
        .list-selector select {
            padding: 0.4rem 0.6rem;
            font-size: 0.9rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: white;
            cursor: pointer;
        }
        .list-selector select:focus { border-color: #e67e22; }
        .list-selector select.active { border-color: #27ae60; }

        /* Ingredients */
        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 0;
            border-bottom: 1px solid #eee;
        }
        .ingredient-item:last-child { border-bottom: none; }
        .color-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .ing-name { font-weight: bold; color: #2c3e50; flex: 1; min-width: 80px; }
        .ing-qty {
            color: #666;
            font-size: 0.9rem;
            background: #f5f5f5;
            border-radius: 6px;
            padding: 0.2rem 0.55rem;
            white-space: nowrap;
        }
        .count-badge {
            min-width: 28px;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            color: #27ae60;
        }
        .delete-btn {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.25rem 0.45rem;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .delete-btn:hover { background: #e74c3c; color: white; }
        .add-to-list-btn {
            background: none;
            border: 2px solid #27ae60;
            color: #27ae60;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            line-height: 1;
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .add-to-list-btn:hover { background: #27ae60; color: white; }
        .remove-from-list-btn {
            background: none;
            border: 2px solid #aaa;
            color: #aaa;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            line-height: 1;
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .remove-from-list-btn:hover { border-color: #e74c3c; color: #e74c3c; }

        /* Add ingredient form */
        .add-form {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed #eee;
        }
        .add-form select, .add-form input {
            padding: 0.65rem 0.8rem;
            font-size: 0.95rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: white;
        }
        .add-form select:focus, .add-form input:focus { border-color: #e67e22; }
        .add-form .qty-input { max-width: 90px; flex: 0 0 90px; }
        .add-form .unit-select { max-width: 100px; flex: 0 0 100px; }
        .add-form .product-select { flex: 1; min-width: 140px; }
        .add-form .btn-add {
            padding: 0.65rem 1.1rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .add-form .btn-add:hover { background: #cf6d17; }
        .empty { color: #aaa; font-style: italic; padding: 0.4rem 0; }

        /* Images */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.7rem;
            margin-bottom: 1rem;
        }
        .image-wrap {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
            background: #f0f0f0;
        }
        .image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .image-wrap .img-delete {
            position: absolute;
            top: 4px; right: 4px;
            background: rgba(0,0,0,0.55);
            color: white;
            border: none;
            border-radius: 50%;
            width: 26px; height: 26px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .image-wrap:hover .img-delete { opacity: 1; }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .upload-area:hover { border-color: #e67e22; }
        .upload-area input[type=file] { display: none; }
        .upload-label {
            color: #aaa;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .upload-label span { color: #e67e22; font-weight: bold; }
        .upload-btn {
            display: none;
            margin-top: 0.6rem;
            padding: 0.5rem 1.2rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .upload-btn:hover { background: #cf6d17; }
    </style>
</head>
<body>
    <header>
        <h1>Dinner Service</h1>
        <nav>
            <a href="/shopping-lists">Shopping Lists</a>
            <a href="/products">Products</a>
            <a href="/products/uncategorized">Uncategorized</a>
            <a href="/recipes" class="active">Recipes</a>
        </nav>
        <form method="post" action="/logout" class="logout">
            <button type="submit">Log out</button>
        </form>
    </header>

    <div class="page">

        <!-- Recipe name & description -->
        <div class="card">
            <div class="card-header">
                <h2 th:text="${recipe.name}"></h2>
                <div style="display:flex;gap:0.4rem;align-items:center;">
                    <a href="/recipes" class="back-link">← All recipes</a>
                    <button class="btn-edit" type="button" onclick="toggleEdit()">Edit</button>
                </div>
            </div>

            <!-- Display mode -->
            <div id="view-section">
                <p class="description-text"
                   th:if="${!#strings.isEmpty(recipe.description)}"
                   th:text="${recipe.description}"></p>
                <p class="empty-desc"
                   th:if="${#strings.isEmpty(recipe.description)}">No description yet.</p>
            </div>

            <!-- Edit mode -->
            <div id="edit-section" class="edit-section">
                <form th:action="'/recipes/' + ${recipe.id} + '/edit'" method="post">
                    <div class="field">
                        <label>Name</label>
                        <input type="text" name="name" th:value="${recipe.name}" required />
                    </div>
                    <div class="field">
                        <label>Description / Instructions</label>
                        <textarea name="description" rows="8"
                                  placeholder="Write instructions, notes, tips…"
                                  th:text="${recipe.description}"></textarea>
                    </div>
                    <div class="btn-row">
                        <button type="submit" class="btn-save">Save</button>
                        <button type="button" class="btn-cancel" onclick="toggleEdit()">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Images -->
        <div class="card">
            <h2 style="margin-bottom:0.8rem;">Photos</h2>
            <div th:if="${!#lists.isEmpty(images)}" class="image-grid">
                <div th:each="img : ${images}" class="image-wrap">
                    <img th:src="'/recipe-images/' + ${img.filename}" th:alt="${img.originalName}" loading="lazy" />
                    <form th:action="'/recipes/' + ${recipe.id} + '/images/' + ${img.id} + '/delete'" method="post">
                        <button class="img-delete" type="submit" title="Delete photo">✕</button>
                    </form>
                </div>
            </div>
            <form th:action="'/recipes/' + ${recipe.id} + '/images'" method="post"
                  enctype="multipart/form-data" id="upload-form">
                <div class="upload-area" onclick="document.getElementById('file-input').click()">
                    <input type="file" name="files" id="file-input" multiple
                           accept="image/jpeg,image/png,image/webp,image/gif"
                           onchange="filesSelected(this)" />
                    <label class="upload-label" for="file-input">
                        <span>Click to upload</span> or drag &amp; drop photos
                    </label>
                </div>
                <button type="submit" class="upload-btn" id="upload-btn">Upload</button>
            </form>
        </div>

        <!-- Ingredients -->
        <div class="card">
            <div class="card-header">
                <h2>Ingredients</h2>
                <div th:if="${!#lists.isEmpty(shoppingLists)}" class="list-selector">
                    <label>Add to list:</label>
                    <form th:action="'/recipes/' + ${recipe.id} + '/select-list'" method="post">
                        <select name="listId" onchange="this.form.submit()"
                                th:classappend="${selectedListId != null} ? 'active' : ''">
                            <option value="">Select list…</option>
                            <option th:each="sl : ${shoppingLists}"
                                    th:value="${sl.id}"
                                    th:text="${sl.name}"
                                    th:selected="${sl.id == selectedListId}"></option>
                        </select>
                    </form>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(ingredients)}" class="empty">No ingredients yet.</div>
            <div th:each="ing : ${ingredients}" class="ingredient-item">
                <div class="color-dot"
                     th:style="'background:' + (${ing.product?.category?.color} ?: '#eee')"></div>
                <span class="ing-name" th:text="${ing.product?.name}"></span>
                <span class="ing-qty"
                      th:text="${ing.quantity != null ? #numbers.formatDecimal(ing.quantity, 1, 2) + ' ' + ing.unit : ing.unit}"></span>

                <!-- −/count/+ controls (only when a list is selected) -->
                <th:block th:if="${selectedListId != null}">
                    <div style="display:flex;align-items:center;gap:0.35rem;">
                        <form th:if="${ingredientCounts[ing.id] != null and ingredientCounts[ing.id] > 0}"
                              th:action="'/recipes/' + ${recipe.id} + '/ingredients/' + ${ing.id} + '/remove-from-list'" method="post">
                            <button type="submit" class="remove-from-list-btn" title="Remove one from list">−</button>
                        </form>
                        <span class="count-badge"
                              th:text="${ingredientCounts[ing.id] != null and ingredientCounts[ing.id] > 0 ? ingredientCounts[ing.id] : ''}"></span>
                        <form th:action="'/recipes/' + ${recipe.id} + '/ingredients/' + ${ing.id} + '/add-to-list'" method="post">
                            <button type="submit" class="add-to-list-btn" title="Add one to list">+</button>
                        </form>
                    </div>
                </th:block>

                <form th:action="'/recipes/' + ${recipe.id} + '/ingredients/' + ${ing.id} + '/delete'" method="post">
                    <button class="delete-btn" type="submit">🗑</button>
                </form>
            </div>

            <!-- Add ingredient -->
            <form th:action="'/recipes/' + ${recipe.id} + '/ingredients'" method="post" class="add-form">
                <select name="productId" class="product-select" required>
                    <option value="" disabled selected>Select product…</option>
                    <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}"></option>
                </select>
                <input type="number" name="quantity" placeholder="Qty" step="0.01" min="0" class="qty-input" />
                <select name="unit" class="unit-select" required>
                    <option value="" disabled selected>Unit</option>
                    <option th:each="u : ${units}" th:value="${u}" th:text="${u}"></option>
                </select>
                <button type="submit" class="btn-add">Add</button>
            </form>
        </div>

    </div>

    <script>
        function toggleEdit() {
            document.getElementById('edit-section').classList.toggle('open');
            document.getElementById('view-section').style.display =
                document.getElementById('edit-section').classList.contains('open') ? 'none' : '';
        }

        function filesSelected(input) {
            const btn = document.getElementById('upload-btn');
            const label = input.closest('.upload-area').querySelector('.upload-label');
            if (input.files.length > 0) {
                const names = Array.from(input.files).map(f => f.name).join(', ');
                label.textContent = input.files.length === 1 ? names : input.files.length + ' files selected';
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        }

        // Drag and drop support
        const uploadArea = document.querySelector('.upload-area');
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#e67e22'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = ''; });
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.style.borderColor = '';
            const input = document.getElementById('file-input');
            input.files = e.dataTransfer.files;
            filesSelected(input);
        });
    </script>
</body>
</html>
