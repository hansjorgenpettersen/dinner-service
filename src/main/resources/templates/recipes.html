<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes – Dinner Service</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        header {
            background: white;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        header h1 { color: #e67e22; margin: 0; font-size: 1.3rem; }
        nav { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        nav a {
            color: #555;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        nav a:hover, nav a.active { background: #fdf3e7; color: #e67e22; }
        form.logout button {
            background: none;
            border: 2px solid #e67e22;
            color: #e67e22;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        form.logout button:hover { background: #e67e22; color: white; }
        .page { max-width: 700px; margin: 1.5rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 1.2rem 1rem;
            margin-bottom: 1.2rem;
        }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.1rem; }
        .form-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .form-row input {
            flex: 1;
            min-width: 0;
            padding: 0.75rem 0.8rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .form-row input:focus { border-color: #e67e22; }
        .form-row button {
            padding: 0.75rem 1.2rem;
            font-size: 1rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        .form-row button:hover { background: #cf6d17; }
        .recipe-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 0;
            border-bottom: 1px solid #eee;
            gap: 0.5rem;
        }
        .recipe-item:last-child { border-bottom: none; }
        .recipe-link {
            font-weight: bold;
            color: #e67e22;
            text-decoration: none;
            font-size: 1rem;
            flex: 1;
        }
        .recipe-link:hover { text-decoration: underline; }
        .recipe-desc {
            color: #888;
            font-size: 0.85rem;
            margin-top: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 380px;
        }
        .delete-btn {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .delete-btn:hover { background: #e74c3c; color: white; }
        .empty { color: #aaa; font-style: italic; padding: 0.5rem 0; }
    </style>
</head>
<body>
    <header>
        <h1>Dinner Service</h1>
        <nav>
            <a href="/shopping-lists">Shopping Lists</a>
            <a href="/products">Products</a>
            <a href="/products/uncategorized">Uncategorized</a>
            <a href="/recipes" class="active">Recipes</a>
        </nav>
        <form method="post" action="/logout" class="logout">
            <button type="submit">Log out</button>
        </form>
    </header>

    <div class="page">

        <!-- New Recipe -->
        <div class="card">
            <h2>New Recipe</h2>
            <form method="post" action="/recipes/new" class="form-row">
                <input type="text" name="name" placeholder="Recipe name" required />
                <button type="submit">Create</button>
            </form>
        </div>

        <!-- Recipe List -->
        <div class="card">
            <h2>All Recipes</h2>
            <div th:if="${#lists.isEmpty(recipes)}" class="empty">No recipes yet.</div>
            <div th:each="recipe : ${recipes}" class="recipe-item">
                <div style="flex:1;min-width:0;">
                    <a th:href="'/recipes/' + ${recipe.id}" class="recipe-link" th:text="${recipe.name}"></a>
                    <div class="recipe-desc"
                         th:if="${!#strings.isEmpty(recipe.description)}"
                         th:text="${recipe.description}"></div>
                </div>
                <form th:action="'/recipes/' + ${recipe.id} + '/delete'" method="post">
                    <button class="delete-btn" type="submit"
                            onclick="return confirm('Delete this recipe?')">🗑</button>
                </form>
            </div>
        </div>

    </div>
</body>
</html>
