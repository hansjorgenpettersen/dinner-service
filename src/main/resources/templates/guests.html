<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guests</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            min-width: 320px;
        }
        h1 { color: #e67e22; font-size: 2rem; margin-bottom: 1.5rem; }
        ul {
            list-style: none;
            padding: 0;
            margin: 0 0 1.5rem;
        }
        ul li {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #eee;
            color: #2c3e50;
            font-size: 1.1rem;
        }
        ul li:last-child { border-bottom: none; }
        .empty { color: #aaa; font-style: italic; }
        a {
            color: #e67e22;
            text-decoration: none;
            font-size: 0.95rem;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Guests</h1>
        <ul th:if="${not #lists.isEmpty(guests)}">
            <li th:each="guest : ${guests}" th:text="${guest.name}"></li>
        </ul>
        <p class="empty" th:if="${#lists.isEmpty(guests)}">No guests yet.</p>
        <a href="/">Back to home</a>
    </div>
</body>
</html>
