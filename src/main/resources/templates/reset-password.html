<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Dinner Service</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            padding: 1rem;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #e67e22; margin-bottom: 0.5rem; font-size: 1.8rem; }
        p.sub { color: #777; margin-bottom: 2rem; font-size: 0.95rem; }
        input[type=password] {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            margin-bottom: 1rem;
        }
        input[type=password]:focus { border-color: #e67e22; }
        button {
            width: 100%;
            padding: 0.85rem;
            font-size: 1rem;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background-color: #cf6d17; }
        .error { color: #e74c3c; font-size: 0.9rem; margin-bottom: 1rem; }
        .back-link { margin-top: 1.5rem; font-size: 0.9rem; color: #777; }
        .back-link a { color: #e67e22; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Dinner Service</h1>
        <p class="sub">Choose a new password</p>
        <p class="error" th:if="${param.error != null and param.error[0] == 'short'}">Password must be at least 8 characters.</p>
        <p class="error" th:if="${param.error != null and param.error[0] == 'mismatch'}">Passwords do not match.</p>
        <form method="post" action="/reset-password">
            <input type="hidden" name="token" th:value="${token}" />
            <input type="password" name="password" placeholder="New password (min 8 characters)" required autofocus />
            <input type="password" name="confirmPassword" placeholder="Confirm new password" required />
            <button type="submit">Set New Password</button>
        </form>
        <p class="back-link"><a href="/login">Back to sign in</a></p>
    </div>
</body>
</html>
