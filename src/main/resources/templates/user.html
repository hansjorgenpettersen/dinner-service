<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e67e22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dinner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
    <title>User – Dinner Service</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        header {
            background: white;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        header h1 { color: #e67e22; margin: 0; font-size: 1.3rem; }
        nav { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        nav a {
            color: #555;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        nav a:hover, nav a.active { background: #fdf3e7; color: #e67e22; }
        .page { max-width: 700px; margin: 1.5rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 1.2rem 1rem;
            margin-bottom: 1.2rem;
        }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.1rem; }
        .email {
            font-size: 1rem;
            color: #444;
            padding: 0.4rem 0;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
            gap: 0.5rem;
        }
        .list-item:last-child { border-bottom: none; }
        .list-name { font-weight: bold; color: #2c3e50; flex: 1; }
        .list-owner { color: #999; font-size: 0.85rem; }
        .leave-btn {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            flex-shrink: 0;
        }
        .leave-btn:hover { background: #e74c3c; color: white; }
        .empty { color: #aaa; font-style: italic; padding: 0.5rem 0; }
        .default-form { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.3rem; }
        .default-form select {
            flex: 1;
            min-width: 0;
            padding: 0.7rem 0.8rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: white;
        }
        .default-form select:focus { border-color: #e67e22; }
        .default-form button {
            padding: 0.7rem 1.2rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            white-space: nowrap;
        }
        .default-form button:hover { background: #cf6d17; }
        .logout-btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            background: none;
            border: 2px solid #e67e22;
            color: #e67e22;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .logout-btn:hover { background: #e67e22; color: white; }
    </style>
</head>
<body>
    <header>
        <h1>Dinner Service</h1>
        <nav>
            <a href="/shopping-lists">Shopping Lists</a>
            <a href="/products">Products</a>
            <a href="/products/uncategorized">Uncategorized</a>
            <a href="/recipes">Recipes</a>
            <a href="/user" class="active">User</a>
        </nav>
    </header>

    <div class="page">

        <!-- Account -->
        <div class="card">
            <h2>Account</h2>
            <div class="email" th:text="${email}"></div>
        </div>

        <!-- Default list -->
        <div class="card">
            <h2>Default list after login</h2>
            <form method="post" action="/user/set-default-list" class="default-form">
                <select name="listId">
                    <option value="">None (go to dashboard)</option>
                    <option th:each="list : ${allLists}"
                            th:value="${list.id}"
                            th:text="${list.name}"
                            th:selected="${list.id == defaultListId}"></option>
                </select>
                <button type="submit">Save</button>
            </form>
        </div>

        <!-- Shared lists -->
        <div class="card">
            <h2>Shared with me</h2>
            <div th:if="${#lists.isEmpty(sharedLists)}" class="empty">No lists shared with you.</div>
            <div th:each="list : ${sharedLists}" class="list-item">
                <div>
                    <div class="list-name" th:text="${list.name}"></div>
                    <div class="list-owner" th:text="'by ' + ${list.owner?.email}"></div>
                </div>
                <form th:action="'/user/leave-list/' + ${list.id}" method="post">
                    <button class="leave-btn" type="submit"
                            onclick="return confirm('Leave this list?')">Leave</button>
                </form>
            </div>
        </div>

        <!-- Log out -->
        <div class="card">
            <form method="post" action="/logout">
                <button class="logout-btn" type="submit">Log out</button>
            </form>
        </div>

    </div>
</body>
</html>
