<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Dinner Service</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            padding: 1rem;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #e67e22; margin-bottom: 0.5rem; font-size: 1.8rem; }
        p.sub { color: #777; margin-bottom: 2rem; font-size: 0.95rem; }
        input[type=email], input[type=password] {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            margin-bottom: 1rem;
        }
        input[type=email]:focus, input[type=password]:focus { border-color: #e67e22; }
        button {
            width: 100%;
            padding: 0.85rem;
            font-size: 1rem;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background-color: #cf6d17; }
        .error { color: #e74c3c; font-size: 0.9rem; margin-bottom: 1rem; }
        .success { color: #27ae60; font-size: 0.9rem; margin-bottom: 1rem; }
        .register-link { margin-top: 1.5rem; font-size: 0.9rem; color: #777; }
        .register-link a { color: #e67e22; text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
        .forgot-link { margin-top: 0.75rem; font-size: 0.85rem; }
        .forgot-link a { color: #aaa; text-decoration: none; }
        .forgot-link a:hover { color: #e67e22; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Dinner Service</h1>
        <p class="sub">Sign in to your account</p>
        <p class="success" th:if="${param.registered}">Account created! Please sign in.</p>
        <p class="success" th:if="${param.reset}">Password reset! You can now sign in.</p>
        <p class="error" th:if="${param.error != null and param.error[0] == 'notfound'}">No account found with that email.</p>
        <p class="error" th:if="${param.error != null and param.error[0] == 'badpass'}">Incorrect password.</p>
        <p class="error" th:if="${param.error != null and param.error[0] == null}">Please fill in all fields.</p>
        <form method="post" action="/login">
            <input type="email" name="email" placeholder="you@example.com" required autofocus autocomplete="username" />
            <input type="password" name="password" placeholder="Password" required autocomplete="current-password" />
            <button type="submit">Sign In</button>
        </form>
        <p class="forgot-link"><a href="/forgot-password">Forgot your password?</a></p>
        <p class="register-link">Don't have an account? <a href="/register">Create one</a></p>
    </div>
</body>
</html>
