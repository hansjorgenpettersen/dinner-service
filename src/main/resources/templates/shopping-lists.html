<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Lists – Dinner Service</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        header {
            background: white;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        header h1 { color: #e67e22; margin: 0; font-size: 1.3rem; }
        nav { display: flex; gap: 0.3rem; }
        nav a {
            color: #555;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        nav a:hover, nav a.active { background: #fdf3e7; color: #e67e22; }
        form.logout button {
            background: none;
            border: 2px solid #e67e22;
            color: #e67e22;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        form.logout button:hover { background: #e67e22; color: white; }
        .page { max-width: 700px; margin: 1.5rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 1.2rem 1rem;
            margin-bottom: 1.2rem;
        }
        .card h2 { color: #2c3e50; margin-top: 0; font-size: 1.1rem; }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item a {
            color: #e67e22;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
        }
        .badge {
            font-size: 0.75rem;
            background: #f0f0f0;
            color: #777;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            white-space: nowrap;
        }
        .new-form { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
        .new-form input {
            flex: 1;
            min-width: 0;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .new-form input:focus { border-color: #e67e22; }
        .new-form button {
            padding: 0.75rem 1.2rem;
            font-size: 1rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        .new-form button:hover { background: #cf6d17; }
        .empty { color: #aaa; font-style: italic; padding: 0.5rem 0; }
    </style>
</head>
<body>
    <header>
        <h1>Dinner Service</h1>
        <nav>
            <a href="/shopping-lists" class="active">Shopping Lists</a>
            <a href="/products">Products</a>
        </nav>
        <form method="post" action="/logout" class="logout">
            <button type="submit">Log out</button>
        </form>
    </header>

    <div class="page">
        <div class="card">
            <h2>New Shopping List</h2>
            <form method="post" action="/shopping-lists/new" class="new-form">
                <input type="text" name="name" placeholder="List name" required />
                <button type="submit">Create</button>
            </form>
        </div>

        <div class="card">
            <h2>My Lists</h2>
            <div th:if="${#lists.isEmpty(owned)}" class="empty">No lists yet.</div>
            <div th:each="list : ${owned}" class="list-item">
                <a th:href="'/shopping-lists/' + ${list.id}" th:text="${list.name}"></a>
                <span class="badge">owner</span>
            </div>
        </div>

        <div class="card" th:if="${not #lists.isEmpty(shared)}">
            <h2>Shared with me</h2>
            <div th:each="list : ${shared}" class="list-item">
                <a th:href="'/shopping-lists/' + ${list.id}" th:text="${list.name}"></a>
                <span class="badge" th:text="'by ' + ${list.owner?.email}"></span>
            </div>
        </div>
    </div>
</body>
</html>
