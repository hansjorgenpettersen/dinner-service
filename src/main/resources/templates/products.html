<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e67e22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dinner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
    <title>Products – Dinner Service</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        header {
            background: white;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        header h1 { color: #e67e22; margin: 0; font-size: 1.3rem; }
        nav { display: flex; gap: 0.3rem; }
        nav a {
            color: #555;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        nav a:hover, nav a.active { background: #fdf3e7; color: #e67e22; }
        form.logout button {
            background: none;
            border: 2px solid #e67e22;
            color: #e67e22;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        form.logout button:hover { background: #e67e22; color: white; }
        .page { max-width: 700px; margin: 1.5rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 1.2rem 1rem;
            margin-bottom: 1.2rem;
        }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.1rem; }
        .form-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .form-row input, .form-row select {
            flex: 1;
            min-width: 0;
            padding: 0.75rem 0.8rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: white;
        }
        .form-row input:focus, .form-row select:focus { border-color: #e67e22; }
        .form-row .price-input { max-width: 110px; flex: 0 0 110px; }
        .form-row .color-input { max-width: 60px; flex: 0 0 60px; padding: 0.3rem; height: 44px; cursor: pointer; }
        .form-row button {
            padding: 0.75rem 1.2rem;
            font-size: 1rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        .form-row button:hover { background: #cf6d17; }
        /* Category list */
        .category-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid #eee;
        }
        .category-item:last-child { border-bottom: none; }
        .color-dot {
            width: 20px; height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .category-name { flex: 1; font-weight: bold; color: #2c3e50; }
        /* Product list */
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }
        .product-item:last-child { border-bottom: none; }
        .product-info { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 0; }
        .product-name { font-weight: bold; color: #2c3e50; font-size: 1rem; }
        .product-price { color: #777; font-size: 0.85rem; }
        .cat-badge {
            font-size: 0.72rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            color: white;
            white-space: nowrap;
        }
        .btn-group { display: flex; gap: 0.4rem; flex-shrink: 0; }
        .edit-btn {
            background: none;
            border: 2px solid #3498db;
            color: #3498db;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
        }
        .edit-btn:hover { background: #3498db; color: white; }
        .delete-btn {
            background: none;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.3rem 0.5rem;
            border-radius: 6px;
        }
        .delete-btn:hover { background: #e74c3c; color: white; }
        .edit-form {
            display: none;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
        }
        .edit-form.open { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .edit-form input, .edit-form select {
            flex: 1;
            min-width: 0;
            padding: 0.6rem 0.8rem;
            font-size: 0.95rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: white;
        }
        .edit-form input:focus, .edit-form select:focus { border-color: #e67e22; }
        .edit-form .price-input { max-width: 110px; flex: 0 0 110px; }
        .edit-form .save-btn {
            padding: 0.6rem 1rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .edit-form .save-btn:hover { background: #1e8449; }
        .group-label {
            font-size: 0.75rem;
            font-weight: bold;
            color: #aaa;
            text-transform: uppercase;
            padding: 0.6rem 0 0.2rem;
        }
        .empty { color: #aaa; font-style: italic; padding: 0.5rem 0; }
    </style>
</head>
<body>
    <header>
        <h1>Dinner Service</h1>
        <nav>
            <a href="/shopping-lists">Shopping Lists</a>
            <a href="/products" class="active">Products</a>
            <a href="/products/uncategorized">Uncategorized</a>
            <a href="/recipes">Recipes</a>
            <a href="/user">User</a>
        </nav>
    </header>

    <div class="page">

        <!-- Categories -->
        <div class="card">
            <h2>Categories</h2>
            <form method="post" action="/categories/new" class="form-row" style="margin-bottom:1rem;">
                <input type="text" name="name" placeholder="Category name" required />
                <input type="color" name="color" value="#e67e22" class="color-input" title="Pick colour" />
                <button type="submit">Add</button>
            </form>
            <div th:if="${#lists.isEmpty(categories)}" class="empty">No categories yet.</div>
            <div th:each="cat : ${categories}" class="category-item">
                <div class="color-dot" th:style="'background:' + ${cat.color}"></div>
                <span class="category-name" th:text="${cat.name}"></span>
                <form th:action="'/categories/' + ${cat.id} + '/delete'" method="post">
                    <button class="delete-btn" type="submit"
                            onclick="return confirm('Delete this category?')">🗑</button>
                </form>
            </div>
        </div>

        <!-- Add Product -->
        <div class="card">
            <h2>Add Product</h2>
            <form method="post" action="/products/new" class="form-row">
                <input type="text" name="name" placeholder="Product name" required />
                <input type="number" name="price" placeholder="Price" step="0.01" min="0" class="price-input" />
                <select name="categoryId">
                    <option value="">No category</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
                <button type="submit">Add</button>
            </form>
        </div>

        <!-- Product list grouped by category -->
        <div class="card">
            <h2>All Products</h2>
            <div th:if="${#lists.isEmpty(products)}" class="empty">No products yet.</div>
            <div th:each="product : ${products}">
                <div class="product-item">
                    <div class="product-info">
                        <div class="color-dot" th:if="${product.category != null}"
                             th:style="'background:' + ${product.category.color}"></div>
                        <div class="color-dot" th:if="${product.category == null}"
                             style="background:#eee"></div>
                        <div>
                            <span class="product-name" th:text="${product.name}"></span>
                            <span class="product-price" th:text="${product.price != null ? #numbers.formatDecimal(product.price, 1, 2) : '–'}"></span>
                        </div>
                    </div>
                    <div class="btn-group">
                        <button class="edit-btn" type="button" th:onclick="'toggleEdit(' + ${product.id} + ')'">✏️</button>
                        <form th:action="'/products/' + ${product.id} + '/delete'" method="post">
                            <button class="delete-btn" type="submit">🗑</button>
                        </form>
                    </div>
                </div>
                <form th:id="'edit-' + ${product.id}" class="edit-form"
                      th:action="'/products/' + ${product.id} + '/edit'" method="post">
                    <input type="text" name="name" th:value="${product.name}" required />
                    <input type="number" name="price" th:value="${product.price}" placeholder="Price"
                           step="0.01" min="0" class="price-input" />
                    <select name="categoryId">
                        <option value="">No category</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${product.category != null and product.category.id == cat.id}"></option>
                    </select>
                    <button type="submit" class="save-btn">Save</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleEdit(id) {
            document.getElementById('edit-' + id).classList.toggle('open');
        }
    </script>
</body>
</html>
