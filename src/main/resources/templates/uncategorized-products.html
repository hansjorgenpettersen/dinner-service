<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uncategorized Products – Dinner Service</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f0f0; }
        header {
            background: white;
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        header h1 { color: #e67e22; margin: 0; font-size: 1.3rem; }
        nav { display: flex; gap: 0.3rem; }
        nav a {
            color: #555;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        nav a:hover, nav a.active { background: #fdf3e7; color: #e67e22; }
        form.logout button {
            background: none;
            border: 2px solid #e67e22;
            color: #e67e22;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        form.logout button:hover { background: #e67e22; color: white; }
        .page { max-width: 700px; margin: 1.5rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 1.2rem 1rem;
            margin-bottom: 1.2rem;
        }
        h2 { color: #2c3e50; margin-top: 0; font-size: 1.1rem; }
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #eee;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .product-item:last-child { border-bottom: none; }
        .product-name { font-weight: bold; color: #2c3e50; font-size: 1rem; flex: 1; min-width: 120px; }
        .product-price { color: #777; font-size: 0.85rem; margin-left: 0.4rem; }
        .assign-form {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .assign-form select {
            padding: 0.5rem 0.7rem;
            font-size: 0.95rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            background: white;
            cursor: pointer;
        }
        .assign-form select:focus { border-color: #e67e22; }
        .assign-form button {
            padding: 0.5rem 1rem;
            font-size: 0.95rem;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        .assign-form button:hover { background: #cf6d17; }
        .empty { color: #aaa; font-style: italic; padding: 0.5rem 0; }
        .badge-count {
            display: inline-block;
            background: #e74c3c;
            color: white;
            border-radius: 20px;
            font-size: 0.75rem;
            padding: 0.1rem 0.55rem;
            margin-left: 0.4rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <header>
        <h1>Dinner Service</h1>
        <nav>
            <a href="/shopping-lists">Shopping Lists</a>
            <a href="/products">Products</a>
            <a href="/products/uncategorized" class="active">Uncategorized</a>
        </nav>
        <form method="post" action="/logout" class="logout">
            <button type="submit">Log out</button>
        </form>
    </header>

    <div class="page">
        <div class="card">
            <h2>
                Uncategorized Products
                <span class="badge-count" th:if="${!#lists.isEmpty(products)}" th:text="${#lists.size(products)}"></span>
            </h2>
            <div th:if="${#lists.isEmpty(categories)}" class="empty" style="margin-bottom:0.8rem;">
                No categories exist yet. <a href="/products">Add categories</a> first.
            </div>
            <div th:if="${#lists.isEmpty(products)}" class="empty">All products have a category.</div>
            <div th:each="product : ${products}" class="product-item">
                <div>
                    <span class="product-name" th:text="${product.name}"></span>
                    <span class="product-price" th:text="${product.price != null ? #numbers.formatDecimal(product.price, 1, 2) : ''}"></span>
                </div>
                <form th:action="'/products/' + ${product.id} + '/edit'" method="post" class="assign-form">
                    <input type="hidden" name="name" th:value="${product.name}" />
                    <input type="hidden" name="price" th:value="${product.price}" />
                    <select name="categoryId" required>
                        <option value="" disabled selected>Pick category…</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                    <button type="submit">Save</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
