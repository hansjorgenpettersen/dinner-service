<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#e67e22">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dinner">
    <link rel="apple-touch-icon" href="/icon.svg">
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
    <title>Forgot Password – Dinner Service</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            padding: 1rem;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #e67e22; margin-bottom: 0.5rem; font-size: 1.8rem; }
        p.sub { color: #777; margin-bottom: 2rem; font-size: 0.95rem; }
        input[type=email] {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            margin-bottom: 1rem;
        }
        input[type=email]:focus { border-color: #e67e22; }
        button {
            width: 100%;
            padding: 0.85rem;
            font-size: 1rem;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background-color: #cf6d17; }
        .success { color: #27ae60; font-size: 0.9rem; margin-bottom: 1rem; }
        .error { color: #e74c3c; font-size: 0.9rem; margin-bottom: 1rem; }
        .back-link { margin-top: 1.5rem; font-size: 0.9rem; color: #777; }
        .back-link a { color: #e67e22; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Dinner Service</h1>
        <p class="sub">Enter your email and we'll send you a reset link</p>
        <p class="success" th:if="${param.sent}">If that email exists, a reset link has been sent.</p>
        <p class="error" th:if="${param.expired}">That reset link has expired. Please request a new one.</p>
        <form method="post" action="/forgot-password" th:if="${param.sent == null}">
            <input type="email" name="email" placeholder="you@example.com" required autofocus />
            <button type="submit">Send Reset Link</button>
        </form>
        <p class="back-link"><a href="/login">Back to sign in</a></p>
    </div>
</body>
</html>
